<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Vyankyaa Foods Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/icons.css">
  <script src="js/svg-icons.js"></script>
</head>
<body style="background: var(--cream); display: flex; align-items: center; justify-content: center; min-height: 100vh;">
  <div style="width: 100%; max-width: 400px; padding: 32px;">
    <!-- Logo -->
    <div style="text-align: center; margin-bottom: 48px;">
      <h1 style="font-family: 'Bebas Neue', cursive; font-size: 32px; color: var(--earth); margin-bottom: 4px;">Vyankyaa Foods</h1>
      <p style="font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--light-text); letter-spacing: 2px; text-transform: uppercase;">Admin Panel</p>
    </div>
    
    <!-- Subtitle -->
    <div style="text-align: center; margin-bottom: 32px;">
      <p style="font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--light-text); letter-spacing: 2px; text-transform: uppercase;">Restricted Access — Authorised Personnel Only</p>
    </div>
    
    <!-- Login Form -->
    <form id="loginForm" style="display: flex; flex-direction: column; gap: 20px;">
      <div>
        <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">Username</label>
        <input type="text" id="username" name="username" required style="width: 100%;" placeholder="Enter username">
      </div>
      
      <div>
        <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">Password</label>
        <input type="password" id="password" name="password" required style="width: 100%;" placeholder="Enter password">
      </div>
      
      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
        Sign In
      </button>
      
      <div id="error-message" style="color: var(--clay); font-size: 13px; text-align: center; display: none;"></div>
    </form>
  </div>
  
  <script src="js/data.js"></script>
  <script src="js/admin.js"></script>
  <script>
    // Override auth check for login page
    document.addEventListener('DOMContentLoaded', function() {
      // Check if already logged in
      if (sessionStorage.getItem('vf_auth')) {
        window.location.href = 'index.html';
        return;
      }
      
      // Initialize SVG icons
      initSVGIcons();
      
      // Login form handler
      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('error-message');
        
        // Get credentials from settings
        const settings = VF.getSettings();
        
        if (username === settings.username && password === settings.password) {
          // Successful login
          sessionStorage.setItem('vf_auth', 'true');
          VF.log('Admin login successful');
          window.location.href = 'index.html';
        } else {
          // Show error
          errorEl.textContent = 'Invalid username or password';
          errorEl.style.display = 'block';
          
          // Clear password field
          document.getElementById('password').value = '';
          
          // Hide error after 3 seconds
          setTimeout(() => {
            errorEl.style.display = 'none';
          }, 3000);
        }
      });
    });
  </script>
</body>
</html>
